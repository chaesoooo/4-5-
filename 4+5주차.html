3. 소송비용은 피고의 부담으로 한다.`,
4:`1. 피고와 유소영 사이에 김포시 장기동 71 대 123㎡에 관하여 2024. 9. 20. 체결된 매매계약을 취소한다.

5:`1. 가. 피고와 을 사이에 별지 목록 기재 아파트에 관하여 2024. 2. 3. 체결된 매매계약을 170,000,000원의 한도 내에서 취소한다.
나. 피고는 원고에게 170,000,000원 및 이에 대한 이 판결 확정일 다음 날부터 다 갚는 날까지 연 5%의 비율로 계산한 돈을 지급하라.`,
6:`1. 가. 피고와 박채무 사이에 별지 목록 기재 부동산 중 2분의 1 지분에 관하여 2023. 10. 29. 체결된 매매계약을 150,000,000원의 한도 내에서 취소한다. 
나. 피고는 원고에게 150,000,000원 및 이에 대한 이 판결 확정일 다음 날부터 다 갚는 날까지 연 5%의 비율로 계산한 돈을 지급하라.`

// 공통 로직
function buildPage(targetId, answers, prefix){
let html=""
for(let i in answers){
html+=`
<div class="problem">
<h3>${i}번</h3>
<textarea id="${prefix}_answer${i}"></textarea>
<div id="${prefix}_result${i}" class="result"></div>
</div>`
}
document.getElementById(targetId).innerHTML=html
}

function buildLCS(a,b){
let dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0))
for(let i=1;i<=a.length;i++){
for(let j=1;j<=b.length;j++){
dp[i][j]=(a[i-1]===b[j-1])?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1])
}
}
return dp
}

function highlight(user,correct){
let dp=buildLCS(correct,user)
let i=correct.length, j=user.length, result=""
while(i>0 && j>0){
if(correct[i-1]===user[j-1]){
result=user[j-1]+result; i--; j--;
}else if(dp[i][j-1]>=dp[i-1][j]){
result=`<span class="wrong">${user[j-1]}</span>`+result; j--;
}else i--;
}
while(j>0){
result=`<span class="wrong">${user[j-1]}</span>`+result; j--;
}
return result
}

function lcsLength(a,b){
return buildLCS(a,b)[a.length][b.length]
}

function gradeAll(type){
let answers = (type==='4') ? answers4 : answers5
let prefix = type

for(let i in answers){
let user=document.getElementById(`${prefix}_answer${i}`).value.trim()
let correct=answers[i]

let lcs=lcsLength(correct,user)
let wrong=(correct.length+user.length)-2*lcs

document.getElementById(`${prefix}_result${i}`).innerHTML=
`<b>틀린 개수: ${wrong}개</b><br><br>`+
highlight(user,correct)+
`<br><br><b>정답</b><br>${correct}`
}
}

// 초기 렌더링
buildPage("exam4", answers4, "4")
buildPage("exam5", answers5, "5")

</script>
